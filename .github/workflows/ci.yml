name: BovWeight CR — CI Laravel

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: bovweight_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, pdo, pdo_mysql
          coverage: none

      - name: Copiar archivo .env
        run: cp .env.example .env.testing

      - name: Instalar dependencias con Composer
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Generar clave de aplicación
        run: php artisan key:generate --env=testing

      - name: Ejecutar migraciones sobre MySQL de prueba
        env:
          APP_ENV: testing
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: bovweight_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate --force --env=testing

      - name: Ejecutar pruebas PHPUnit
        env:
          APP_ENV: testing
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: bovweight_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan test --env=testing